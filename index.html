<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="main">
      <header>
        <div class="logo">
          <h2>FinTrack Pro</h2>
          <span>Enterprise Finance</span>
        </div>
        <nav>
          <h3 id="profileName"></h3>
          <button id="logoutBtn">Logout</button>
        </nav>
      </header>
      <section class="main-container">
        <div class="sidebar">
          <nav>
           <div>
             <a href="/">dashboard</a>
            <a href="/setting">setting</a>
           </div>
            <button id="add-transaction-btn">+ add transaction</button>
          </nav>
        </div>
        <section class="main-section"></section>
      </section>
    </main>
    <section class="form-modal">
      <!-- Login Form Start -->
      <div class="form-area" id="register" style="display: block">
        <h2>Create Account</h2>
        <h3>Join FinTrack Pro</h3>
        <form action="" id="registerForm">
          <label>Choose a Username</label>
          <input type="text" />
          <label>Password</label>
          <input type="password" />
          <button type="submit">register</button>
        </form>
        <h4>
          Already have an account?
          <button class="url-btn" onclick="showPage('login')">
            Login here
          </button>
        </h4>
      </div>
      <!-- Login Form End -->

      <!-- Reister Form Start -->
      <div class="form-area" id="login" style="display: none">
        <h2>Welcome Back</h2>
        <h3>Login to FinTrack Pro</h3>
        <form action="" id="loginForm">
          <label>Username</label>
          <input type="text" />
          <label>Password</label>
          <input type="password" />
          <button type="submit">login</button>
        </form>
        <h4>
          Don't have an account?
          <button class="url-btn" onclick="showPage('register')">
            Register here
          </button>
        </h4>
      </div>
      <!-- Reister Form End -->
    </section>

    <!-- Transaction Add Modal Start -->
    <section class="transaction-modal">
      <div class="form-area">
        <div class="title-area">
          <h2>Add Transaction</h2>
          <button id="closeModal">X</button>
        </div>
        <form action="" id="addTransactionForm">
          <div class="form-group">
            <div>
                <label>Type</label>
            <select id="txType" required="">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
            </div>
          </div>
          <label>Description</label>
          <input type="text" placeholder="e.g. Amazon, Salary, Coffee" />
          <div class="form-group">
            <div>
              <label>Ammount</label>
              <input type="number" placeholder="" />
            </div>
            <div>
              <label>Date</label>
              <input type="date" placeholder="" />
            </div>
          </div>
          <div class="form-group">
           <div>
             <label>Category</label>
            <select id="txCategory" required="">
              <option value="" disabled="" selected="">
                Select a category
              </option>
              <option value="Food Dining">Food Dining</option>
              <option value="Shopping">Shopping</option>
              <option value="Recharge Bills">Recharge Bills</option>
              <option value="Petrol Auto">Petrol Auto</option>
              <option value="Utilities">Utilities</option>
              <option value="Salary">Salary</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
           </div>
          </div>
          <button type="submit">Save Transaction</button>
        </form>
      </div>
      <!-- Transaction Add Modal Start End -->
    </section>

    <script src="script.js"></script>
  </body>
</html>
